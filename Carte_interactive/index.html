<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Carte interactive</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
    <div class="avatar">A</div>
    <h1 id="name">Alex Martin</h1>
    <p id="description">Développeur débutant</p>
    <ul id="skills"></ul>

    <!-- Création des boutonq avec l'événement "onclick" -->

    <button onclick="changeName()">Changer le nom</button>
    <button onclick="changeColors()">Changer la couleur</button>
    <button onclick="changeSkills()">Changer le skills</button>
    <button onclick="hiddenDescription()">Afficher/cacher la description</button>
</div>
<script src="script.js"></script>

</body>
</html>
